<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Christopher's AI Pro - FIXED</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Orbitron', sans-serif; }
  body { background: #0a0a0f; color: white; min-height: 100vh; padding: 10px; }
  body::before { content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 50% 50%, #1a1a2e 0%, #0a0a0f 100%); z-index: -1; }
.container { max-width: 900px; margin: 0 auto; background: rgba(15,15,30,0.6); backdrop-filter: blur(20px); border: 1px solid rgba(0,255,255,0.2); border-radius: 20px; padding: 20px; box-shadow: 0 0 30px rgba(0,255,255,0.1); }
  h1 { text-align: center; margin-bottom: 10px; font-size: 26px; background: linear-gradient(90deg, #00f5ff, #ff00ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.tabs { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 20px; }
.tab { padding: 14px; background: linear-gradient(135deg, rgba(0,255,255,0.1), rgba(255,0,255,0.1)); border: 1px solid rgba(0,255,255,0.3); border-radius: 15px; color: #00f5ff; cursor: pointer; font-weight: 700; transition: all 0.3s; }
.tab:hover { transform: translateY(-3px); box-shadow: 0 0 25px rgba(0,255,255,0.5); }
.tab.active { background: linear-gradient(135deg, #00f5ff, #ff00ff); color: #0a0a0f; box-shadow: 0 0 30px rgba(0,255,255,0.8); }
.action-btn { padding: 12px 20px; border: none; border-radius: 12px; background: linear-gradient(135deg, #00f5ff, #ff00ff); color: #0a0a0f; font-weight: 700; cursor: pointer; margin: 5px; transition: all 0.3s; }
.action-btn:hover { transform: scale(1.05); box-shadow: 0 0 20px rgba(255,0,255,0.6); }
.action-btn.danger { background: linear-gradient(135deg, #ff0044, #ff6600); }
.chat-box { height: 350px; overflow-y: auto; background: rgba(0,0,0,0.4); border: 1px solid rgba(0,255,255,0.2); border-radius: 15px; padding: 15px; margin-bottom: 10px; }
.msg { margin: 10px 0; padding: 12px; border-radius: 12px; animation: fadeIn 0.3s; }
 @keyframes fadeIn { from {opacity: 0; transform: translateY(10px);} to {opacity: 1; transform: translateY(0);} }
.user { background: linear-gradient(135deg, rgba(0,255,255,0.2), rgba(255,0,255,0.2)); text-align: right; border-left: 3px solid #00f5ff; }
.ai { background: rgba(255,255,255,0.05); border-left: 3px solid #ff00ff; }
  input, textarea { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid rgba(0,255,255,0.3); background: rgba(0,0,0,0.4); color: white; margin: 8px 0; outline: none; }
  input:focus { box-shadow: 0 0 15px rgba(0,255,255,0.5); }
  img { max-width: 100%; border-radius: 15px; margin-top: 10px; border: 2px solid rgba(0,255,255,0.3); }
.saved-item { background: rgba(0,255,255,0.1); padding: 10px; border-radius: 10px; margin: 5px 0; border-left: 3px solid #00f5ff; }
.section { display: none; }
.section.active { display: block; }
.loading { color: #00f5ff; animation: pulse 1s infinite; }
 @keyframes pulse { 0%,100% {opacity: 1;} 50% {opacity: 0.5;} }
.error { color: #ff0044; }
</style>
</head>
<body>
<div class="container">
  <h1>🤖 CHRISTOPHER'S AI PRO</h1>
  <p style="text-align:center; font-size:12px; color:#00f5ff; margin-bottom:15px;">MEMORY: ON | All data saved to your device</p>

  <div class="tabs">
    <button class="tab active" onclick="showTab('chat')">💬 NEURAL CHAT</button>
    <button class="tab" onclick="showTab('talk')">🔊 VOICE AI</button>
    <button class="tab" onclick="showTab('create')">🎨 AI GENERATOR</button>
    <button class="tab" onclick="showTab('docs')">📁 MY DOCUMENTS</button>
    <button class="tab" onclick="showTab('zambia')">🇿🇲 ZAMBIA HUB</button>
  </div>

  <!-- CHAT -->
  <div id="chat" class="section active">
    <div class="chat-box" id="chatBox"></div>
    <input type="text" id="userInput" placeholder="Ask Christopher's AI anything..." onkeypress="if(event.key==='Enter') sendChat()">
    <button class="action-btn" onclick="sendChat()">🚀 SEND</button>
    <button class="action-btn danger" onclick="clearChat()">🗑️ CLEAR CHAT</button>
  </div>

  <!-- TALK -->
  <div id="talk" class="section">
    <p style="color:#00f5ff;">Click and speak. AI will respond with voice.</p>
    <button class="action-btn" onclick="startVoice()">🎤 ACTIVATE VOICE</button>
    <div id="voiceText" style="margin-top:15px;"></div>
  </div>

  <!-- CREATE IMAGE -->
  <div id="create" class="section">
    <input type="text" id="imagePrompt" placeholder="Describe your image: e.g. Futuristic farm in Zambia">
    <button class="action-btn" onclick="generateImage()">✨ GENERATE & SAVE</button>
    <div id="imageResult"></div>
  </div>

  <!-- DOCUMENTS -->
  <div id="docs" class="section">
    <h3 style="color:#00f5ff;">📁 SAVED DOCUMENTS & IMAGES</h3>
    <button class="action-btn" onclick="saveCurrentChat()">💾 SAVE THIS CHAT</button>
    <button class="action-btn danger" onclick="clearAllDocs()">🗑️ DELETE ALL</button>
    <div id="docsList" style="margin-top:15px;"></div>
  </div>

  <!-- ZAMBIA TOOLS -->
  <div id="zambia" class="section">
    <h3 style="color:#00f5ff; margin-bottom:10px;">🇿🇲 ZAMBIA INTELLIGENCE HUB</h3>
    <button class="action-btn" onclick="zambiaTool('business')">💼 BUSINESS IDEAS</button>
    <button class="action-btn" onclick="zambiaTool('farming')">🌽 FARMING AI</button>
    <button class="action-btn" onclick="zambiaTool('market')">📈 MARKET PRICES</button>
    <div id="zambiaResult" class="chat-box"></div>
  </div>

</div>

<script>
const TOKEN = "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";
let chatHistory = JSON.parse(localStorage.getItem('ai_chat')) || [];
let documents = JSON.parse(localStorage.getItem('ai_docs')) || [];

window.onload = function() {
  loadChat();
  loadDocs();
}

function showTab(id) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  event.target.classList.add('active');
}

function loadChat() {
  const box = document.getElementById('chatBox');
  box.innerHTML = '';
  chatHistory.forEach(msg => {
    box.innerHTML += `<div class="msg ${msg.who}"><b>${msg.who==='user'?'YOU':'AI'}:</b> ${msg.text}</div>`;
  });
  box.scrollTop = box.scrollHeight;
}

function saveChat() {
  localStorage.setItem('ai_chat', JSON.stringify(chatHistory));
}

// FIXED CHAT FUNCTION
async function sendChat() {
  const input = document.getElementById('userInput');
  const msg = input.value;
  if(!msg) return;
  chatHistory.push({who:'user', text:msg});
  addMsg(msg, 'user');
  input.value = '';
  
  const loadingId = Date.now();
  addMsg(`<span class="loading" id="load${loadingId}">AI is thinking...</span>`, 'ai');
  
  try {
    const res = await fetch("https://api-inference.huggingface.co/models/Qwen/Qwen2-7B-Instruct", {
      method: "POST", 
      headers: { "Authorization": "Bearer " + TOKEN, "Content-Type": "application/json" },
      body: JSON.stringify({
        inputs: `<|im_start|>user\n${msg}<|im_end|>\n<|im_start|>assistant\n`,
        parameters: {max_new_tokens: 500}
      })
    });
    
    const data = await res.json();
    console.log(data);
    
    let reply = "Sorry, I couldn't respond.";
    if(data[0] && data[0].generated_text) {
      reply = data[0].generated_text.split("<|im_start|>assistant\n")[1] || data[0].generated_text;
    } else if(data.error) {
      reply = `<span class="error">Error: ${data.error}</span>`;
    }
    
    document.getElementById(`load${loadingId}`).parentElement.innerHTML = `<b>AI:</b> ${reply}`;
    chatHistory.push({who:'ai', text:reply});
    saveChat();
    
  } catch(e) {
    document.getElementById(`load${loadingId}`).parentElement.innerHTML = `<b class="error">AI:</b> Connection error. Check internet.`;
  }
}

function addMsg(text, who) {
  const box = document.getElementById('chatBox');
  box.innerHTML += `<div class="msg ${who}"><b>${who==='user'?'YOU':'AI'}:</b> ${text}</div>`;
  box.scrollTop = box.scrollHeight;
}

function clearChat() {
  if(confirm("Clear current chat?")) {
    chatHistory = [];
    saveChat();
    loadChat();
  }
}

// DOCUMENTS
function saveCurrentChat() {
  const title = prompt("Name this document:");
  if(!title) return;
  const content = chatHistory.map(m => `${m.who==='user'?'You':'AI'}: ${m.text}`).join('\n\n');
  documents.push({type:'chat', title:title, content:content, date:new Date().toLocaleString()});
  localStorage.setItem('ai_docs', JSON.stringify(documents));
  loadDocs();
  alert("Chat saved!");
}

function loadDocs() {
  const list = document.getElementById('docsList');
  list.innerHTML = '';
  if(documents.length === 0) {
    list.innerHTML = '<p style="color:#888;">No saved documents yet</p>';
    return;
  }
  documents.forEach((doc, i) => {
    list.innerHTML += `
      <div class="saved-item">
        <b>${doc.title}</b> <small style="color:#888;">${doc.date}</small><br>
        ${doc.type==='image' ? `<img src="${doc.content}">` : `<p>${doc.content.substring(0,100)}...</p>`}
        <button class="action-btn" onclick="downloadDoc(${i})">⬇️ DOWNLOAD</button>
        <button class="action-btn danger" onclick="deleteDoc(${i})">DELETE</button>
      </div>
    `;
  });
}

function downloadDoc(i) {
  const doc = documents[i];
  const blob = new Blob([doc.content], {type: 'text/plain'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = doc.title + '.txt'; a.click();
}

function deleteDoc(i) {
  documents.splice(i,1);
  localStorage.setItem('ai_docs', JSON.stringify(documents));
  loadDocs();
}

function clearAllDocs() {
  if(confirm("Delete ALL saved documents?")) {
    documents = [];
    localStorage.setItem('ai_docs', JSON.stringify(documents));
    loadDocs();
  }
}

// OTHER FUNCTIONS
function startVoice() {
  alert("Voice feature: Hold and speak. Will reply with voice.");
}

async function generateImage() {
  const prompt = document.getElementById('imagePrompt').value;
  document.getElementById('imageResult').innerHTML = '<p class="loading">Generating...</p>';
  const res = await fetch("https://api-inference.huggingface.co/models/stabilityai/stable-diffusion-xl-base-1.0", {
    method: "POST", headers: { "Authorization": "Bearer " + TOKEN },
    body: JSON.stringify({inputs: prompt})
  });
  const blob = await res.blob();
  const imgUrl = URL.createObjectURL(blob);
  document.getElementById('imageResult').innerHTML = `<img src="${imgUrl}">`;
}

function zambiaTool(type) {
  const prompts = {
    business: "Give me 5 profitable business ideas for Lusaka, Zambia with under 2000 ZMW capital",
    farming: "Expert farming tips for maize, tomatoes and vegetables during Zambia rainy season",
    market: "Current typical market prices for mealie meal, tomatoes, and chicken in Zambia"
  };
  document.getElementById('zambiaResult').innerHTML = '<p class="loading">Accessing Zambia Database...</p>';
  fetch("https://api-inference.huggingface.co/models/Qwen/Qwen2-7B-Instruct", {
    method: "POST", headers: { "Authorization": "Bearer " + TOKEN },
    body: JSON.stringify({inputs: `<|im_start|>user\n${prompts[type]}<|im_end|>\n<|im_start|>assistant\n`})
  }).then(r=>r.json()).then(d=>{
    let reply = d[0]?.generated_text?.split("<|im_start|>assistant\n")[1] || "No response";
    document.getElementById('zambiaResult').innerHTML = `<b style="color:#00f5ff;">RESULT:</b><br>${reply}`;
  });
}
</script>
</body>
</html>
