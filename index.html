<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Christopher's AI - KNOWS EVERYTHING</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Orbitron', sans-serif; }
  body { background: #0a0a0f; color: white; padding: 10px; }
  body::before { content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 50% 50%, #1a1a2e 0%, #0a0a0f 100%); z-index: -1; }
.container { max-width: 900px; margin: 0 auto; background: rgba(15,15,30,0.6); backdrop-filter: blur(20px); border: 1px solid rgba(0,255,255,0.2); border-radius: 20px; padding: 20px; }
  h1 { text-align: center; font-size: 24px; background: linear-gradient(90deg, #00f5ff, #ff00ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.action-btn { padding: 12px 18px; border: none; border-radius: 12px; background: linear-gradient(135deg, #00f5ff, #ff00ff); color: #0a0a0f; font-weight: 700; cursor: pointer; margin: 5px; }
.chat-box { height: 400px; overflow-y: auto; background: rgba(0,0,0,0.4); border: 1px solid rgba(0,255,255,0.2); border-radius: 15px; padding: 15px; margin-bottom: 10px; }
.msg { margin: 10px 0; padding: 12px; border-radius: 12px; }
.user { background: linear-gradient(135deg, rgba(0,255,255,0.2), rgba(255,0,255,0.2)); text-align: right; border-left: 3px solid #00f5ff; }
.ai { background: rgba(255,255,255,0.05); border-left: 3px solid #ff00ff; }
  input { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid rgba(0,255,255,0.3); background: rgba(0,0,0,0.4); color: white; }
.loading { color: #00f5ff; }
.source { color: #00f5ff; font-size: 10px; }
</style>
</head>
<body>
<div class="container">
  <h1>🤖 CHRISTOPHER'S AI PRO</h1>
  <p style="text-align:center; color:#00ff88; font-size:12px;">GROQ + TAVILY SEARCH = KNOWS EVERYTHING</p>

  <div class="chat-box" id="chatBox"></div>
  <input type="text" id="userInput" placeholder="Ask: news, weather, price, anything..." onkeypress="if(event.key==='Enter') sendChat()">
  <button class="action-btn" onclick="sendChat()">🚀 ASK AI</button>
  <button class="action-btn" onclick="startVoice()">🎤 TALK</button>

</div>

<script>
// YOUR KEYS - REVOKE AFTER TESTING
const GROQ_API = "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";
const TAVILY_API = "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";

let chatHistory = [];

// 1. SEARCH WEB WITH TAVILY
async function searchWeb(query) {
  try {
    const res = await fetch("https://api.tavily.com/search", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ api_key: TAVILY_API, query: query, search_depth: "advanced", max_results: 3 })
    });
    const data = await res.json();
    if(!data.results) return "";
    return data.results.map(r => `• ${r.title}: ${r.content}`).join("\n\n");
  } catch(e) { return ""; }
}

// 2. SEND TO GROQ
async function sendChat() {
  const input = document.getElementById('userInput');
  const msg = input.value; if(!msg) return;
  addMsg(msg, 'user'); input.value = '';
  addMsg('<span class="loading">🧠 Searching web + Thinking...</span>', 'ai');

  let needsSearch = /news|weather|price|today|latest|who won|score|bitcoin|dollar/i.test(msg);
  let searchResults = "";
  if(needsSearch) {
    searchResults = await searchWeb(msg);
  }

  const finalPrompt = needsSearch
  ? `Today is April 29, 2026. User in Lusaka, Zambia asked: ${msg}\n\nLatest info from web:\n${searchResults}\n\nAnswer using this info.`
    : `Today is April 29, 2026. User in Lusaka, Zambia asked: ${msg}`;

  const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
    method: "POST",
    headers: { "Authorization": "Bearer " + GROQ_API, "Content-Type": "application/json" },
    body: JSON.stringify({ model: "llama3-70b-8192", messages: [{role: "user", content: finalPrompt}] })
  });
  const data = await res.json();
  let reply = data.choices[0].message.content;

  document.getElementById('chatBox').lastChild.remove();
  addMsg(reply, 'ai');
  speakText(reply);
}

function addMsg(text, who) {
  const box = document.getElementById('chatBox');
  box.innerHTML += `<div class="msg ${who}"><b>${who==='user'?'YOU':'AI'}:</b> ${text}</div>`;
  box.scrollTop = box.scrollHeight;
}

// VOICE
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
const recognition = new SpeechRecognition(); recognition.lang = 'en-US';
const speech = new SpeechSynthesisUtterance(); speech.lang = 'en-US';
function startVoice() { recognition.start(); }
recognition.onresult = e => { document.getElementById('userInput').value = e.results[0][0].transcript; sendChat(); }
function speakText(text) { speech.text = text; window.speechSynthesis.speak(speech); }
</script>
</body>
</html>
