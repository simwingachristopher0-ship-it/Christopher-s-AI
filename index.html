<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Christopher's AI Pro - FINAL</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Orbitron', sans-serif; }
  body { background: #0a0a0f; color: white; min-height: 100vh; padding: 10px; }
  body::before { content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 50% 50%, #1a1a2e 0%, #0a0a0f 100%); z-index: -1; }
.container { max-width: 900px; margin: 0 auto; background: rgba(15,15,30,0.6); backdrop-filter: blur(20px); border: 1px solid rgba(0,255,255,0.2); border-radius: 20px; padding: 20px; }
  h1 { text-align: center; margin-bottom: 10px; font-size: 24px; background: linear-gradient(90deg, #00f5ff, #ff00ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.tabs { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin-bottom: 20px; }
.tab { padding: 14px; background: linear-gradient(135deg, rgba(0,255,255,0.1), rgba(255,0,255,0.1)); border: 1px solid rgba(0,255,255,0.3); border-radius: 15px; color: #00f5ff; cursor: pointer; font-weight: 700; font-size: 12px; }
.tab.active { background: linear-gradient(135deg, #00f5ff, #ff00ff); color: #0a0a0f; }
.action-btn { padding: 12px 18px; border: none; border-radius: 12px; background: linear-gradient(135deg, #00f5ff, #ff00ff); color: #0a0a0f; font-weight: 700; cursor: pointer; margin: 5px; font-size: 14px; }
.chat-box { height: 350px; overflow-y: auto; background: rgba(0,0,0,0.4); border: 1px solid rgba(0,255,255,0.2); border-radius: 15px; padding: 15px; margin-bottom: 10px; }
.msg { margin: 10px 0; padding: 12px; border-radius: 12px; word-wrap: break-word; }
.user { background: linear-gradient(135deg, rgba(0,255,255,0.2), rgba(255,0,255,0.2)); text-align: right; border-left: 3px solid #00f5ff; }
.ai { background: rgba(255,255,255,0.05); border-left: 3px solid #ff00ff; }
  input { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid rgba(0,255,255,0.3); background: rgba(0,0,0,0.4); color: white; margin: 8px 0; }
.saved-item { background: rgba(0,255,255,0.1); padding: 10px; border-radius: 10px; margin: 5px 0; }
.section { display: none; }
.section.active { display: block; }
.loading { color: #00f5ff; }
.error { color: #ff0044; }
.warning { background: rgba(255,255,0,0.2); padding: 10px; border-radius: 10px; margin-bottom: 10px; font-size: 12px; }
</style>
</head>
<body>
<div class="container">
  <h1>🤖 CHRISTOPHER'S AI PRO</h1>
  <div class="warning">⚠️ Need 200KB/s+ internet. Current: Check top of screen. If under 100KB/s it will be slow.</div>

  <div class="tabs">
    <button class="tab active" onclick="showTab('chat')">💬 NEURAL CHAT</button>
    <button class="tab" onclick="showTab('docs')">📁 MY DOCUMENTS</button>
    <button class="tab" onclick="showTab('zambia')">🇿🇲 ZAMBIA HUB</button>
  </div>

  <div id="chat" class="section active">
    <div class="chat-box" id="chatBox"></div>
    <input type="text" id="userInput" placeholder="Ask Christopher's AI..." onkeypress="if(event.key==='Enter') sendChat()">
    <button class="action-btn" onclick="sendChat()">🚀 SEND</button>
    <button class="action-btn" style="background:linear-gradient(135deg,#ff0044,#ff6600)" onclick="clearChat()">🗑️ CLEAR</button>
  </div>

  <div id="docs" class="section">
    <h3 style="color:#00f5ff;">📁 SAVED DOCUMENTS</h3>
    <button class="action-btn" onclick="saveCurrentChat()">💾 SAVE CHAT</button>
    <div id="docsList" style="margin-top:15px;"></div>
  </div>

  <div id="zambia" class="section">
    <h3 style="color:#00f5ff;">🇿🇲 ZAMBIA INTELLIGENCE HUB</h3>
    <button class="action-btn" onclick="zambiaTool('business')">💼 BUSINESS</button>
    <button class="action-btn" onclick="zambiaTool('farming')">🌽 FARMING</button>
    <div id="zambiaResult" class="chat-box"></div>
  </div>

</div>

<script>
const TOKEN = "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";
// USE CORS PROXY FOR GITHUB PAGES
const PROXY = "https://api.allorigins.win/raw?url=";
const API_URL = "https://api-inference.huggingface.co/models/TinyLlama/TinyLlama-1.1B-Chat-v1.0";

let chatHistory = JSON.parse(localStorage.getItem('ai_chat')) || [];
let documents = JSON.parse(localStorage.getItem('ai_docs')) || [];

window.onload = function() {
  loadChat();
  loadDocs();
}

function showTab(id) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  event.target.classList.add('active');
}

function loadChat() {
  const box = document.getElementById('chatBox');
  box.innerHTML = '';
  chatHistory.forEach(msg => {
    box.innerHTML += `<div class="msg ${msg.who}"><b>${msg.who==='user'?'YOU':'AI'}:</b> ${msg.text}</div>`;
  });
  box.scrollTop = box.scrollHeight;
}

function saveChat() {
  localStorage.setItem('ai_chat', JSON.stringify(chatHistory));
}

async function sendChat() {
  const input = document.getElementById('userInput');
  const msg = input.value;
  if(!msg) return;
  chatHistory.push({who:'user', text:msg});
  addMsg(msg, 'user');
  input.value = '';
  
  const loadingId = Date.now();
  addMsg(`<span class="loading" id="load${loadingId}">AI is thinking... Wait 10-20s</span>`, 'ai');
  
  try {
    const fullUrl = PROXY + encodeURIComponent(API_URL);
    const res = await fetch(fullUrl, {
      method: "POST", 
      headers: { "Authorization": "Bearer " + TOKEN, "Content-Type": "application/json" },
      body: JSON.stringify({inputs: `User: ${msg}\nAI:`, parameters: {max_new_tokens: 150}})
    });
    
    if(!res.ok) throw new Error("HTTP " + res.status);
    
    const data = await res.json();
    let reply = data[0]?.generated_text || "No response from AI";
    reply = reply.replace(`User: ${msg}\nAI:`, '').trim();
    if(reply.length < 3) reply = "I got your message! Ask me again.";
    
    document.getElementById(`load${loadingId}`).parentElement.innerHTML = `<b>AI:</b> ${reply}`;
    chatHistory.push({who:'ai', text:reply});
    saveChat();
    
  } catch(e) {
    document.getElementById(`load${loadingId}`).parentElement.innerHTML = 
      `<b class="error">AI:</b> Connection failed. <br>1. Check internet is 4G<br>2. Wait 10s and try again<br>Error: ${e.message}`;
  }
}

function addMsg(text, who) {
  const box = document.getElementById('chatBox');
  box.innerHTML += `<div class="msg ${who}"><b>${who==='user'?'YOU':'AI'}:</b> ${text}</div>`;
  box.scrollTop = box.scrollHeight;
}

function clearChat() {
  if(confirm("Clear chat?")) {
    chatHistory = [];
    saveChat();
    loadChat();
  }
}

function saveCurrentChat() {
  const title = prompt("Name this document:");
  if(!title) return;
  const content = chatHistory.map(m => `${m.who==='user'?'You':'AI'}: ${m.text}`).join('\n\n');
  documents.push({type:'chat', title:title, content:content, date:new Date().toLocaleString()});
  localStorage.setItem('ai_docs', JSON.stringify(documents));
  loadDocs();
  alert("Saved!");
}

function loadDocs() {
  const list = document.getElementById('docsList');
  list.innerHTML = '';
  if(documents.length === 0) {
    list.innerHTML = '<p style="color:#888;">No saved documents yet</p>';
    return;
  }
  documents.forEach((doc, i) => {
    list.innerHTML += `
      <div class="saved-item">
        <b>${doc.title}</b> <small style="color:#888;">${doc.date}</small><br>
        <p>${doc.content.substring(0,100)}...</p>
      </div>
    `;
  });
}

function zambiaTool(type) {
  const prompts = {
    business: "5 business ideas in Lusaka Zambia under 2000 ZMW",
    farming: "Farming tips for maize in Zambia rainy season"
  };
  document.getElementById('zambiaResult').innerHTML = '<p class="loading">Loading...</p>';
  fetch(PROXY + encodeURIComponent(API_URL), {
    method: "POST", headers: { "Authorization": "Bearer " + TOKEN },
    body: JSON.stringify({inputs: `User: ${prompts[type]}\nAI:`, parameters: {max_new_tokens: 150}})
  }).then(r=>r.json()).then(d=>{
    let reply = d[0]?.generated_text?.replace(`User: ${prompts[type]}\nAI:`, '') || "No response";
    document.getElementById('zambiaResult').innerHTML = `<b style="color:#00f5ff;">RESULT:</b><br>${reply}`;
  }).catch(e=>{
    document.getElementById('zambiaResult').innerHTML = `<span class="error">Error: Check internet</span>`;
  });
}
</script>
</body>
</html>
