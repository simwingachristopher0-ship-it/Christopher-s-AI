<!DOCTYPE html>
<html>
<head>
  <title>Christopher's AI</title>
  <style>
    body { font-family: Arial; max-width: 700px; margin: 20px auto; background: #f0f0f0; }
    #chat { background: white; padding: 15px; height: 400px; overflow-y: scroll; border-radius: 10px; }
   .user { color: blue; margin: 10px 0; }
   .ai { color: green; margin: 10px 0; }
    input { width: 70%; padding: 10px; }
    button { padding: 10px 15px; }
    img { max-width: 100%; border-radius: 10px; margin-top: 10px; }
  </style>
</head>
<body>
  <h1>🤖 Christopher's AI</h1>
  <p>Type "image: your prompt" to generate images</p>
  <div id="chat"></div>
  <input id="input" placeholder="Ask me anything...">
  <button onclick="send()">Send</button>

  <script>
    const chat = document.getElementById('chat');
    const input = document.getElementById('input');

    async function send() {
      let text = input.value;
      if (!text) return;
      input.value = "";
      chat.innerHTML += `<div class="user"><b>You:</b> ${text}</div>`;

      // IMAGE
      if (text.toLowerCase().startsWith("image:")) {
        let prompt = text.substring(6);
        let imageUrl = `https://pollinations.ai/p/${encodeURIComponent(prompt)}?model=gptimage-large`;
        chat.innerHTML += `<div class="ai"><b>AI:</b> Generating...<br><img src="${imageUrl}"></div>`;
      } 
      // CHAT - Using Pollinations Grok. No key, no CORS issues
      else {
        try {
          chat.innerHTML += `<div class="ai"><b>AI:</b> Thinking...</div>`;
          let url = `https://text.pollinations.ai/${encodeURIComponent(text)}?model=grok`;
          let response = await fetch(url);
          let aiText = await response.text();
          
          // remove "Thinking..." and show answer
          chat.innerHTML = chat.innerHTML.replace('<div class="ai"><b>AI:</b> Thinking...</div>', '');
          chat.innerHTML += `<div class="ai"><b>AI:</b> ${aiText}</div>`;
        } catch(e) {
          chat.innerHTML += `<div class="ai"><b>Error:</b> ${e.message}</div>`;
        }
      }
      chat.scrollTop = chat.scrollHeight;
    }

    input.addEventListener("keypress", e => { if(e.key === "Enter") send() });
  </script>
</body>
</html>
